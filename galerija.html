    <style>
        /* Extra stilovi samo za galerija.html */
        .gallery-page-header {
            padding-top: 120px;
            padding-bottom: 3rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
        }

        .gallery-page-header h1 {
            color: var(--white);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .gallery-page-header p {
            font-weight: 300;
            opacity: 0.85;
            font-size: 1.1rem;
        }

        .gallery-page-header h1::after,
        .gallery-page-header h2::after {
            display: none;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1.5rem;
            color: var(--white);
            opacity: 0.85;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        .back-link:hover {
            opacity: 1;
        }

        .gallery-full {
            background-color: var(--beige);
            padding: 4rem 8%;
        }

        .gallery-full-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-full-item {
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.12);
            aspect-ratio: 4/3;
            position: relative;
        }

        .gallery-full-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .gallery-full-item:hover img {
            transform: scale(1.08);
        }

        .gallery-full-item .img-overlay {
            position: absolute;
            inset: 0;
            background: rgba(58, 90, 64, 0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .gallery-full-item:hover .img-overlay {
            background: rgba(58, 90, 64, 0.25);
        }

        .img-overlay svg {
            opacity: 0;
            transform: scale(0.7);
            transition: opacity 0.3s, transform 0.3s;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .gallery-full-item:hover .img-overlay svg {
            opacity: 1;
            transform: scale(1);
        }

        @media (max-width: 768px) {
            .gallery-page-header h1 { font-size: 2rem; }
            .gallery-full { padding: 3rem 5%; }
            .gallery-full-grid { gap: 12px; }
        }
    </style>

    <script>
        // Hamburger
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('open');
            hamburger.classList.toggle('active');
        });

        // Navbar scroll
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
        });

        // Fade-in
        const faders = document.querySelectorAll('.fade-in');
        const appearOnScroll = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                entry.target.classList.add('appear');
                observer.unobserve(entry.target);
            });
        }, { threshold: 0.1 });
        faders.forEach(f => appearOnScroll.observe(f));

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        function openLightbox(src) {
            lightbox.style.display = 'flex';
            lightboxImg.src = src;
        }
        function closeLightbox() {
            lightbox.style.display = 'none';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    </script>
